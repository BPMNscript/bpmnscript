# "demo" profile — for manually running the loan-approval example.
#
# Activate with:  --spring.profiles.active=demo  (or SPRING_PROFILES_ACTIVE=demo)
#
# The default profile keeps classpath auto-deployment OFF so the testcontainers
# harness can deploy each definition via REST against a clean engine. This profile
# turns it ON so the bundled loan-approval.bpmn deploys on startup and shows up in
# Cockpit/Tasklist with no manual deploy step.
operaton.bpm:
  auto-deployment-enabled: true
