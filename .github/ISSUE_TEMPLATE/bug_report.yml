name: Bug Report
description: Report a bug in BPMNscript
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Create a `.bpmnscript` file with the following content: ...
        2. Open the file in VS Code
        3. Observe ...
    validations:
      required: true
  - type: input
    id: reproduction
    attributes:
      label: Reproduction Link
      description: Link to a minimal repository or gist that reproduces the issue.
      placeholder: https://github.com/...
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: BPMNscript Version
      description: Which version of BPMNscript are you using?
      placeholder: e.g. 0.1.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or log output.
